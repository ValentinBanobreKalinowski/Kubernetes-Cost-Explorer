apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontendServiceName }}
  namespace: {{ .Values.frontendNamespaceName }}
  {{- if eq .Values.frontendServiceType "LoadBalancer" }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    {{- if .Values.frontendCertArn }}
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: {{ .Values.frontendCertArn }}
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.frontendServiceType }}
  selector:
    app: {{ .Values.frontendImageName }}
  ports:
    - name: http
      port: 8080
      targetPort: 80
      {{- if eq .Values.frontendServiceType "NodePort" }}
      nodePort: {{ .Values.frontendNodePort }}
      {{- end }}
    {{- if .Values.frontendCertArn }}
    - name: https
      port: 443
      targetPort: 80
    {{- end }}
