apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontendIngressName }}
  namespace: {{ .Values.frontendNamespaceName }}
  annotations:
    traefik.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontendServiceName }}
            port:
              number: 8080
