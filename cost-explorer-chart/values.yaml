# Amount of replicas for the backend deployment and frontend deployment
replicaCount: 3
minReplicas: 3
maxReplicas: 30

# Stabilization window seconds for scaling up and down
scaleUpStabilizationWindowSeconds: 60
scaleDownStabilizationWindowSeconds: 60

# Percentage of pods to scale up and down once
scaleUpPercent: 500
scaleDownPercent: 100

# Number of seconds to wait before scaling up and down
scaleUpPeriodSeconds: 10
scaleDownPeriodSeconds: 15

# Average CPU utilization target for the HPA
cpuAverageUtilization: 50

# Backend resource names
backendImageName: "cost-explorer-backend"

# Full image ref (repo[:tag]) actually used by the deployment. Defaults to the
# bare name for local k3d/skaffold builds; overridden with a registry+tag for EKS.
backendImage: "cost-explorer-backend"
backendPostgresImageName: "postgres:17-alpine"
backendPostgresLabel: "postgres"
backendDeploymentName: "cost-explorer-backend-deployment"
backendPostgresDeploymentName: "cost-explorer-db-deployment"


backendHPAName: "cost-explorer-backend-hpa"
backendNamespaceName: "backend"
backendServiceName: "cost-explorer-backend-service"
backendPostgresServiceName: "cost-explorer-db-service"

backendPvcName: "postgres-pvc"

postgresPersistentStorage: true

# Whether to run Postgres as an in-cluster Deployment (local k3d dev) or
# connect to an external instance like RDS instead. When false, the
# postgres Deployment/Service/PVC are skipped entirely and backendPostgresHost
# must point at the external host.
deployInClusterPostgres: true

# Postgres host the backend connects to. Empty defaults to the in-cluster
# service name; set to the RDS endpoint when deployInClusterPostgres is false.
backendPostgresHost: ""

# RDS enforces SSL by default; the local in-cluster Postgres doesn't support it.
backendPostgresSsl: false

# Postgres credentials
backendPostgresSecretName: "cost-explorer-db-secret"

# ServiceAccount the backend pods run as. Local k3d dev uses
# the auto-created "default" SA, EKS deploys override this to 
# the Terraform-created SA that's annotated with the IRSA role for S3 report uploads.
backendServiceAccountName: "default"

# S3 bucket for hourly cost reports. Empty means reporting is disabled - only
# set when deploying to AWS via the EKS profile. Since local cluster has 
# no IRSA credentials to write to S3 we leave it empty.
s3ReportsBucket: ""
awsRegion: ""


# Frontend resource names
frontendImageName: "cost-explorer-frontend"

# Full image ref (repo[:tag]) actually used by the deployment. Defaults to the
# bare name for local k3d/skaffold builds; overridden with a registry+tag for EKS.
frontendImage: "cost-explorer-frontend"
frontendDeploymentName: "cost-explorer-frontend-deployment"
frontendHPAName: "cost-explorer-frontend-hpa"
frontendNamespaceName: "frontend"
frontendServiceName: "cost-explorer-frontend-service"
frontendIngressName: "cost-explorer-frontend-ingress"

# NodePort for local k3d dev; set to LoadBalancer for a real external IP on EKS.
frontendServiceType: "NodePort"
frontendNodePort: 30080

# Resource requests and limits for the backend container
requests:
  memory: "256Mi"
  cpu: "200m"
limits:
  memory: "500Mi"
  cpu: "300m"

# Frontend container is nginx serving static files - kept small so HPA scaling is visible under load
frontendRequests:
  memory: "32Mi"
  cpu: "20m"
frontendLimits:
  memory: "64Mi"
  cpu: "100m"

frontendCpuAverageUtilization: 20

